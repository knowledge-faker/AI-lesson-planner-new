<!DOCTYPE html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>赤壁赋 · 交互课件</title><style>body{font-family: 'KaiTi', 'STKaiti', serif; margin:0; padding:0; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; display: flex; justify-content: center; align-items: center;}.container{max-width: 900px; margin: 2rem; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); color: #e0e7e9; border: 1px solid rgba(255,255,255,0.2);}.title{text-align: center; font-size: 3rem; margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(255,215,0,0.5); animation: fadeInDown 1s;}.subtitle{text-align: center; font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.8; animation: fadeIn 2s;}.content{display: flex; flex-direction: column; gap: 1.5rem;}.section{background: rgba(255,255,255,0.1); border-radius: 12px; padding: 1.5rem; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; animation: fadeInUp 0.8s both;}.section:hover{transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);}.section-title{font-size: 1.8rem; margin-bottom: 1rem; border-left: 4px solid #f9d423; padding-left: 0.8rem;}.section-text{line-height: 1.8; font-size: 1.1rem; text-indent: 2em; margin: 0.5rem 0;}.interactive-area{display: flex; justify-content: center; gap: 1rem; margin-top: 1rem;}.btn{padding: 0.8rem 2rem; border: none; border-radius: 30px; font-size: 1rem; font-family: inherit; background: rgba(249,212,35,0.8); color: #1a1a2e; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(249,212,35,0.3);}.btn:hover{background: #f9d423; transform: scale(1.05); box-shadow: 0 6px 20px rgba(249,212,35,0.5);}.btn:active{transform: scale(0.95);}.info-box{background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; margin-top: 1rem; text-align: center; min-height: 2.5rem; display: flex; align-items: center; justify-content: center; transition: all 0.5s;}.highlight{color: #f9d423; font-weight: bold;}.footer{text-align: center; margin-top: 2rem; font-size: 0.9rem; opacity: 0.6;}@keyframes fadeInDown{0%{opacity:0; transform: translateY(-20px);}100%{opacity:1; transform: translateY(0);}}@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}@keyframes fadeInUp{0%{opacity:0; transform: translateY(20px);}100%{opacity:1; transform: translateY(0);}}.float{animation: float 3s ease-in-out infinite;}@keyframes float{0%,100%{transform: translateY(0);}50%{transform: translateY(-10px);}}</style></head><body><div class='container'><div class='title'>赤壁赋</div><div class='subtitle'>宋 · 苏轼</div><div class='content'><div class='section' style='animation-delay: 0.1s;'><div class='section-title'>📜 背景</div><p class='section-text'>《赤壁赋》写于苏轼被贬黄州期间。元丰五年（1082年），苏轼与友人泛舟游赤壁，面对江月，感叹人生无常，写下此赋。全篇主客问答，抑扬顿挫，展现了苏轼超然物外的豁达情怀。</p></div><div class='section' style='animation-delay: 0.2s;'><div class='section-title'>🌊 原文</div><p class='section-text'>壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。少焉，月出于东山之上，徘徊于斗牛之间。白露横江，水光接天。纵一苇之所如，凌万顷之茫然。浩浩乎如冯虚御风，而不知其所止；飘飘乎如遗世独立，羽化而登仙。</p></div><div class='section' style='animation-delay: 0.3s;'><div class='section-title'>✨ 互动</div><div class='interactive-area'><button class='btn' onclick='showDetail()'>赏析</button><button class='btn' onclick='showMoon()'>明月</button><button class='btn' onclick='showLife()'>感慨</button></div><div id='infoBox' class='info-box'>点击按钮感受赤壁之美</div></div></div><div class='footer'>—— 赤壁赋 · 交互课件</div></div><script>const infoBox = document.getElementById('infoBox');function showDetail(){infoBox.innerHTML = '“清风徐来，水波不兴” 开篇点染出宁静的江景，为后文抒发情感铺垫。';infoBox.style.background = 'rgba(255,215,0,0.2)';}function showMoon(){infoBox.innerHTML = '“月出于东山之上，徘徊于斗牛之间” 拟人手法写月，赋予月以人的情感，意境优美。';infoBox.style.background = 'rgba(173,216,230,0.2)';}function showLife(){infoBox.innerHTML = '“哀吾生之须臾，羡长江之无穷” 感叹人生短暂，但苏轼随即转悲为喜，展现豁达。';infoBox.style.background = 'rgba(255,182,193,0.2)';}</script></body></html>
